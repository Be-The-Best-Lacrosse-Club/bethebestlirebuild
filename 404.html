<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | BTB Lacrosse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .error-page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .error-inner {
            max-width: 500px;
        }

        .error-code {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(6rem, 15vw, 10rem);
            color: #D22630;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .error-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        .error-text {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.5);
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .error-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.9rem 2rem;
            font-size: 0.8rem;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            text-decoration: none;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: #D22630;
            color: #fff;
            transition: all 0.3s ease;
        }

        .error-btn:hover {
            background: #a01e26;
            transform: translateY(-2px);
        }

        footer {
            padding: 2rem;
        }

        .footer-inner {
            max-width: 1000px;
        }
    </style>
</head>
<body>
    <header class="btb-header" id="navbar">
        <a href="index.html" class="btb-logo">
            <img src="assets/B 3d Metal Logo copy.png" alt="Be The Best Lacrosse">
        </a>
        <nav class="btb-nav" id="navLinks">
            <a href="index.html">Home</a>
            <a href="players-hub.html">Players Hub</a>
            <a href="world-series.html">World Series</a>
            <a href="gallery.html">Gallery</a>
            <a href="coach-bios.html">Coaches</a>
            <a href="faq.html">FAQ</a>
            <a href="index.html#apply" class="btb-cta">Register Now</a>
        </nav>
        <div class="hamburger" id="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </header>

    <div class="error-page">
        <div class="error-inner">
            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-text">Looks like this play didn't develop the way we planned. The page you're looking for doesn't exist or has been moved.</p>
            <a href="index.html" class="error-btn">Back to Home</a>
        </div>
    </div>

    <footer>
        <div class="footer-inner">
            <div class="footer-copy">&copy; 2026 Be The Best Lacrosse. All rights reserved.</div>
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="players-hub.html">Players Hub</a>
                <a href="coach-bios.html">Coaches</a>
                <a href="faq.html">FAQ</a>
            </div>
        </div>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('open');
        }
        document.querySelectorAll('.btb-nav a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('navLinks').classList.remove('open');
            });
        });
    </script>
</body>
</html>
