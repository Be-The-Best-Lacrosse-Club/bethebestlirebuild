<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Progress — BTB Film Study Lab</title>
  <meta name="description" content="Track your film study progress across every concept in the BTB library.">
  <link rel="stylesheet" href="../css/btb-core.css">
  <style>
    .progress-hero {
      background: var(--btb-black);
      color: var(--btb-white);
      padding: var(--space-xl) var(--space-lg) var(--space-md);
    }
    .progress-hero-inner {
      max-width: var(--max-width);
      margin: 0 auto;
    }
    .progress-hero h1 {
      font-size: 1.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .progress-hero h1 .red { color: var(--btb-red); }
    .progress-hero p {
      color: var(--btb-gray-300);
      font-size: 0.9rem;
      margin-top: var(--space-xs);
    }

    .progress-overview {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-xl);
      margin-bottom: var(--space-2xl);
    }

    .program-progress {
      background: var(--btb-white);
      border: 1px solid var(--btb-gray-200);
      border-radius: 6px;
      overflow: hidden;
    }
    .program-progress-header {
      background: var(--btb-black);
      color: var(--btb-white);
      padding: var(--space-lg);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .program-progress-header h3 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .overall-percent {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--btb-red);
    }
    .program-progress-body {
      padding: var(--space-lg);
    }

    .category-progress {
      margin-bottom: var(--space-lg);
    }
    .category-progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-xs);
    }
    .category-progress-name {
      font-family: var(--font-heading);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .category-progress-count {
      font-size: 0.8rem;
      color: var(--btb-gray-500);
    }

    .concept-checklist {
      margin-top: var(--space-2xl);
    }
    .concept-checklist h3 {
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: var(--space-lg);
      padding-bottom: var(--space-sm);
      border-bottom: 2px solid var(--btb-red);
      display: inline-block;
    }

    .checklist-item {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      border-bottom: 1px solid var(--btb-gray-100);
      cursor: pointer;
      transition: background 0.15s;
    }
    .checklist-item:hover { background: var(--btb-gray-100); }

    .checklist-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--btb-gray-300);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .checklist-item.checked .checklist-checkbox {
      background: var(--btb-red);
      border-color: var(--btb-red);
      color: var(--btb-white);
      font-size: 0.7rem;
    }
    .checklist-item.checked .checklist-label {
      color: var(--btb-gray-400);
      text-decoration: line-through;
    }

    .checklist-label { font-size: 0.9rem; }
    .checklist-sub {
      font-size: 0.75rem;
      color: var(--btb-gray-400);
      margin-left: auto;
    }

    .reset-bar {
      margin-top: var(--space-xl);
      text-align: center;
    }

    @media (max-width: 768px) {
      .progress-overview { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo">
        <span class="logo-btb">BTB</span>
        <span class="logo-sub">Be The Best Lacrosse</span>
        <span class="logo-title">Film Study Lab</span>
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation">☰</button>
      <nav class="main-nav">
        <a href="../index.html">Home</a>
        <a href="library.html">Concept Library</a>
        <a href="archive.html">Game Archive</a>
        <a href="breakdown.html">Coach Panel</a>
        <a href="progress.html">My Progress</a>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <section class="progress-hero">
    <div class="progress-hero-inner">
      <h1>My <span class="red">Progress</span></h1>
      <p>Track what you've studied. Mark concepts as completed to see your growth.</p>
    </div>
  </section>

  <!-- MAIN -->
  <main class="container">
    <!-- OVERVIEW -->
    <div class="progress-overview" id="progress-overview"></div>

    <!-- DETAILED CHECKLIST -->
    <div class="concept-checklist">
      <div class="control-group" style="margin-bottom:var(--space-lg);">
        <span class="control-label" style="color:var(--btb-black);">Program</span>
        <button class="btn btn-sm prog-btn active" data-prog="boys">Boys</button>
        <button class="btn btn-sm prog-btn" data-prog="girls">Girls</button>
      </div>
      <div id="checklist-content"></div>
    </div>

    <div class="reset-bar">
      <button class="btn btn-sm" id="reset-progress" style="color:var(--btb-gray-400);border-color:var(--btb-gray-300);">Reset All Progress</button>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">BTB</div>
      <div class="footer-tagline">BE THE BEST LACROSSE — FILM STUDY LAB</div>
    </div>
  </footer>

  <script src="../js/btb-data.js"></script>
  <script src="../js/btb-ui.js"></script>
  <script>
    // ============= PROGRESS STATE (in-memory) =============
    let progressData = {};
    let activeProg = 'boys';

    // Try to load from memory (session-scoped)
    try {
      const saved = sessionStorage.getItem('btb-progress');
      if (saved) progressData = JSON.parse(saved);
    } catch {}

    function saveProgress() {
      try { sessionStorage.setItem('btb-progress', JSON.stringify(progressData)); } catch {}
    }

    function isStudied(program, concept) {
      return progressData[`${program}-${concept}`] === true;
    }

    function toggleStudied(program, concept) {
      const key = `${program}-${concept}`;
      progressData[key] = !progressData[key];
      saveProgress();
    }

    // ============= RENDER OVERVIEW =============
    function renderOverview() {
      const container = document.getElementById('progress-overview');
      container.innerHTML = '';

      ['boys', 'girls'].forEach(prog => {
        const taxonomy = getTaxonomy(prog);
        let totalConcepts = 0;
        let studied = 0;
        const categories = [];

        Object.values(taxonomy).forEach(cat => {
          let catTotal = 0;
          let catStudied = 0;
          Object.values(cat.subcategories).forEach(items => {
            items.forEach(item => {
              const name = getConceptName(item);
              totalConcepts++;
              catTotal++;
              if (isStudied(prog, name)) {
                studied++;
                catStudied++;
              }
            });
          });
          categories.push({ title: cat.title, icon: cat.icon, total: catTotal, studied: catStudied });
        });

        const pct = totalConcepts > 0 ? Math.round((studied / totalConcepts) * 100) : 0;

        const card = document.createElement('div');
        card.className = 'program-progress';
        card.innerHTML = `
          <div class="program-progress-header">
            <h3>${prog === 'boys' ? 'Boys' : 'Girls'} Lacrosse</h3>
            <span class="overall-percent">${pct}%</span>
          </div>
          <div class="program-progress-body">
            <div style="margin-bottom:var(--space-md);">
              <div style="font-weight:600;font-size:0.9rem;margin-bottom:var(--space-xs);">
                ${studied} / ${totalConcepts} concepts studied
              </div>
              <div class="progress-bar">
                <div class="progress-fill" style="width:${pct}%"></div>
              </div>
            </div>
            ${categories.map(c => {
              const cPct = c.total > 0 ? Math.round((c.studied / c.total) * 100) : 0;
              return `
                <div class="category-progress">
                  <div class="category-progress-header">
                    <span class="category-progress-name">${c.icon} ${c.title}</span>
                    <span class="category-progress-count">${c.studied}/${c.total}</span>
                  </div>
                  <div class="progress-bar">
                    <div class="progress-fill" style="width:${cPct}%"></div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        `;
        container.appendChild(card);
      });
    }

    // ============= RENDER CHECKLIST =============
    function renderChecklist() {
      const container = document.getElementById('checklist-content');
      const taxonomy = getTaxonomy(activeProg);
      let html = '';

      Object.values(taxonomy).forEach(cat => {
        html += `<h3 style="font-size:1rem;text-transform:uppercase;letter-spacing:1px;margin-top:var(--space-xl);margin-bottom:var(--space-sm);">${cat.icon} ${cat.title}</h3>`;

        Object.entries(cat.subcategories).forEach(([subName, items]) => {
          html += `<div style="font-family:var(--font-heading);font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--btb-gray-500);padding:var(--space-sm) var(--space-md);background:var(--btb-gray-100);margin-top:var(--space-sm);">${subName}</div>`;

          items.forEach(item => {
            const name = getConceptName(item);
            const active = isConceptActive(item);
            const checked = isStudied(activeProg, name);
            html += `
              <div class="checklist-item ${checked ? 'checked' : ''}" data-concept="${name}" data-prog="${activeProg}">
                <div class="checklist-checkbox">${checked ? '✓' : ''}</div>
                <span class="checklist-label">${name}</span>
                ${active ? '<span class="checklist-sub" style="color:var(--btb-red);">HAS CONTENT</span>' : '<span class="checklist-sub">Coming Soon</span>'}
              </div>
            `;
          });
        });
      });

      container.innerHTML = html;

      // Wire click handlers
      container.querySelectorAll('.checklist-item').forEach(item => {
        item.addEventListener('click', () => {
          const concept = item.dataset.concept;
          const prog = item.dataset.prog;
          toggleStudied(prog, concept);
          item.classList.toggle('checked');
          const cb = item.querySelector('.checklist-checkbox');
          cb.textContent = item.classList.contains('checked') ? '✓' : '';
          renderOverview();
        });
      });
    }

    // ============= PROGRAM TOGGLE =============
    document.querySelectorAll('.prog-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeProg = btn.dataset.prog;
        document.querySelectorAll('.prog-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderChecklist();
      });
    });

    // ============= RESET =============
    document.getElementById('reset-progress').addEventListener('click', () => {
      if (confirm('Reset all progress? This cannot be undone.')) {
        progressData = {};
        saveProgress();
        renderOverview();
        renderChecklist();
      }
    });

    // ============= INIT =============
    renderOverview();
    renderChecklist();
  </script>
</body>
</html>
