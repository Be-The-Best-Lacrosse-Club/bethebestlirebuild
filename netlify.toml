[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Netlify Identity — route confirmation/recovery/invite tokens to the SPA
[[redirects]]
  from = "/confirmation"
  to = "/login#confirmation_token=:token"
  status = 302
  query = { confirmation_token = ":token" }

[[redirects]]
  from = "/recovery"
  to = "/login#recovery_token=:token"
  status = 302
  query = { token = ":token" }

[[redirects]]
  from = "/invite"
  to = "/login#invite_token=:token"
  status = 302
  query = { token = ":token" }
