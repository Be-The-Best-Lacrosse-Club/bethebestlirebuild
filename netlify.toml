[build]
  command = "npm run build"
  publish = "dist"

# Force non-www to www
[[redirects]]
  from = "https://bethebestli.com/*"
  to = "https://www.bethebestli.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/coach-tools.html"
  to = "/coach-tools.html"
  status = 200

[[redirects]]
  from = "/film-breakdown.html"
  to = "/film-breakdown.html"
  status = 200

# Plainedge coach resources — serve static HTML directly
[[redirects]]
  from = "/bethpage-scout.html"
  to = "/bethpage-scout.html"
  status = 200

[[redirects]]
  from = "/lynbrook-scout.html"
  to = "/lynbrook-scout.html"
  status = 200

[[redirects]]
  from = "/10-man-ride.html"
  to = "/10-man-ride.html"
  status = 200

[[redirects]]
  from = "/defensive-playbook.html"
  to = "/defensive-playbook.html"
  status = 200

[[redirects]]
  from = "/playbook-studio.html"
  to = "/playbook-studio.html"
  status = 200

# Film Study Lab — serve static files directly
[[redirects]]
  from = "/film-study-lab/*"
  to = "/film-study-lab/:splat"
  status = 200

# SMS Policy — serve the static HTML so bots/scrapers (Twilio A2P reviewers, etc.)
# see real content without requiring JS execution. Must come before the SPA catch-all.
[[redirects]]
  from = "/sms-policy"
  to = "/sms-policy.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Netlify Identity — route confirmation/recovery/invite tokens to the SPA
[[redirects]]
  from = "/confirmation"
  to = "/login#confirmation_token=:token"
  status = 302
  query = { confirmation_token = ":token" }

[[redirects]]
  from = "/recovery"
  to = "/login#recovery_token=:token"
  status = 302
  query = { token = ":token" }

[[redirects]]
  from = "/invite"
  to = "/login#invite_token=:token"
  status = 302
  query = { token = ":token" }
