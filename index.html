<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <title>BTB Lacrosse | Choose Your Program</title>
    <meta name="description" content="BTB Lacrosse — Long Island's premier lacrosse development program for boys and girls.">
    <meta name="theme-color" content="#D22630">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #000;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Logo ── */
        .logo {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .logo img {
            height: 64px;
            width: 64px;
            object-fit: contain;
            filter: drop-shadow(0 2px 12px rgba(0,0,0,0.5));
        }

        .logo span {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            letter-spacing: 6px;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        /* ── Split Layout ── */
        .split {
            display: flex;
            height: 100vh;
        }

        .side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            text-decoration: none;
            overflow: hidden;
            transition: flex 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .split:hover .side:not(:hover) {
            flex: 0.85;
        }

        .split:hover .side:hover {
            flex: 1.15;
        }

        /* ── Background Overlays ── */
        .side::before {
            content: '';
            position: absolute;
            inset: 0;
            transition: opacity 0.4s ease;
            z-index: 1;
        }

        .side-boys {
            background: #D22630;
        }

        .side-boys::before {
            background: rgba(0, 0, 0, 0.15);
        }

        .side-boys:hover::before {
            opacity: 0;
        }

        .side-girls {
            background: #FFFFFF;
        }

        .side-girls::before {
            background: rgba(0, 0, 0, 0.03);
        }

        .side-girls:hover::before {
            opacity: 0;
        }

        /* ── Divider ── */
        .divider {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 100%;
            background: rgba(0, 0, 0, 0.1);
            z-index: 5;
            pointer-events: none;
        }

        /* ── Content ── */
        .side-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #fff;
        }

        .side-icon {
            margin-bottom: 1.5rem;
            opacity: 0.9;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }

        .side:hover .side-icon {
            transform: scale(1.1);
            opacity: 1;
        }

        .side-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 6vw, 5rem);
            letter-spacing: 6px;
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 1rem;
            transition: letter-spacing 0.4s ease;
        }

        .side:hover .side-title {
            letter-spacing: 10px;
        }

        .side-boys .side-title {
            color: #FFFFFF;
        }

        .side-girls .side-title {
            color: #D22630;
        }

        .side-enter {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: color 0.4s ease, letter-spacing 0.4s ease;
        }

        .side-boys .side-enter {
            color: rgba(255, 255, 255, 0.5);
        }

        .side-boys:hover .side-enter {
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 5px;
        }

        .side-girls .side-enter {
            color: rgba(210, 38, 48, 0.4);
        }

        .side-girls:hover .side-enter {
            color: rgba(210, 38, 48, 0.8);
            letter-spacing: 5px;
        }

        /* ── Arrow ── */
        .side-arrow {
            display: inline-block;
            opacity: 0;
            transform: translateX(-8px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .side:hover .side-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        /* ── Accent Lines ── */
        .accent-line {
            width: 40px;
            height: 2px;
            margin: 1.5rem auto;
            transition: width 0.4s ease;
        }

        .side:hover .accent-line {
            width: 60px;
        }

        .side-boys .accent-line {
            background: #FFFFFF;
        }

        .side-girls .accent-line {
            background: #D22630;
        }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            .split {
                flex-direction: column;
            }

            .split:hover .side:not(:hover) {
                flex: 1;
            }

            .split:hover .side:hover {
                flex: 1;
            }

            .divider {
                top: 50%;
                left: 0;
                width: 100%;
                height: 1px;
                transform: none;
            }

            .side-title {
                font-size: 3rem;
            }

            .logo img {
                height: 48px;
                width: 48px;
            }

            .logo span {
                font-size: 0.75rem;
                letter-spacing: 4px;
            }
        }

        /* ── Load Animation ── */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .side-content {
            animation: fadeIn 0.8s ease forwards;
        }

        .side-girls .side-content {
            animation-delay: 0.15s;
            opacity: 0;
            color: #1a1a1a;
        }

        .logo {
            animation: fadeIn 0.6s ease forwards;
        }
    </style>
</head>
<body>

    <div class="logo">
        <img src="btb-logo.svg" alt="BTB Lacrosse" onerror="this.style.display='none'">
        <span>BTB Lacrosse</span>
    </div>

    <div class="divider"></div>

    <div class="split">
        <a href="academy-boys.html" class="side side-boys">
            <div class="side-content">
                <div class="side-icon">
                    <svg width="64" height="64" viewBox="0 0 48 48" fill="none">
                        <circle cx="24" cy="24" r="22" stroke="#FFFFFF" stroke-width="1.5" fill="rgba(255,255,255,0.08)"/>
                        <path d="M24 14 L24 34 M18 20 L24 14 L30 20" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h2 class="side-title">Boys</h2>
                <div class="accent-line"></div>
                <span class="side-enter">Enter <span class="side-arrow">&rarr;</span></span>
            </div>
        </a>

        <a href="academy-girls.html" class="side side-girls">
            <div class="side-content">
                <div class="side-icon">
                    <svg width="64" height="64" viewBox="0 0 48 48" fill="none">
                        <circle cx="24" cy="24" r="22" stroke="#D22630" stroke-width="1.5" fill="rgba(210,38,48,0.08)"/>
                        <path d="M24 14 L24 34 M18 20 L24 14 L30 20" stroke="#D22630" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h2 class="side-title">Girls</h2>
                <div class="accent-line"></div>
                <span class="side-enter">Enter <span class="side-arrow">&rarr;</span></span>
            </div>
        </a>
    </div>

</body>
</html>
